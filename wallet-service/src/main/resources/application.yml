server:
    port: 8084

spring:
    application:
        name: wallet-service
    datasource:
        url: jdbc:h2:mem:walletdb
        driverClassName: org.h2.Driver
    h2:
        console:
            enabled: true
    jpa:
        hibernate:
            ddl-auto: create-drop
    rabbitmq:
        host: localhost
        port: 5672
        username: guest
        password: guest

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/

management:
    endpoints:
        web:
            exposure:
                include: "*"